name: 01-CLA-Assistant
## This workflow is used for public repositories

on:
  workflow_dispatch:
 #issue_comment:
 #  types: [created]
 #pull_request_target:
 #  types: [opened,closed,synchronize,reopened]

permissions:
  actions: write
  contents: read # this can be 'read' if the signatures are in remote repository
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    uses: SiliconLabsSoftware/matter_build_action/.github/workflows/cla.yml@main
    secrets:
      CLA_APP_ID: ${{ secrets.SILABSIN_CLA_BOT_APP_ID }}
      CLA_APP_PRIVATE_KEY: ${{ secrets.SILABSIN_CLA_BOT_APP_PRIVATE_KEY }}